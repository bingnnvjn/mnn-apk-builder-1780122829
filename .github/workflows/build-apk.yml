name: Build MNN Android APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Clone MNN
      run: |
        git clone --depth 1 https://github.com/alibaba/MNN.git
        
    - name: Setup JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      
    - name: Setup NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r21e
        
    - name: Build MNN Libraries
      run: |
        cd MNN/project/android
        
        mkdir -p build_64 && cd build_64
        chmod +x ../build_64.sh
        ../build_64.sh \
          -DMNN_LOW_MEMORY=true \
          -DMNN_CPU_WEIGHT_DEQUANT_GEMM=true \
          -DMNN_BUILD_LLM=true \
          -DMNN_SUPPORT_TRANSFORMER_FUSE=true \
          -DLLM_SUPPORT_VISION=true \
          -DMNN_BUILD_OPENCV=true \
          -DMNN_IMGCODECS=true
        cd ..
        
        mkdir -p build_32 && cd build_32
        chmod +x ../build_32.sh
        ../build_32.sh \
          -DMNN_LOW_MEMORY=true \
          -DMNN_CPU_WEIGHT_DEQUANT_GEMM=true \
          -DMNN_BUILD_LLM=true \
          -DMNN_SUPPORT_TRANSFORMER_FUSE=true \
          -DLLM_SUPPORT_VISION=true \
          -DMNN_BUILD_OPENCV=true \
          -DMNN_IMGCODECS=true
      env:
        ANDROID_NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
        
    - name: Build APK
      run: |
        cd MNN/project/android/demo
        chmod +x gradlew
        
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        echo "ndk.dir=$ANDROID_NDK" >> local.properties
        
        ./gradlew assembleDebug
      env:
        ANDROID_NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
        
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: mnn-demo-apk
        path: MNN/project/android/demo/app/build/outputs/apk/debug/*.apk
        
    - name: Create Release
      if: success()
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: MNN APK ${{ github.run_number }}
        files: MNN/project/android/demo/app/build/outputs/apk/debug/*.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

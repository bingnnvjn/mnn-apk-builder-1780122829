name: Build MNN APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Clone MNN 3.5.0
      run: git clone --depth 1 --branch 3.5.0 https://github.com/alibaba/MNN.git
      
    - name: Setup Java 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        
    - name: Build MNN Libraries
      run: |
        cd MNN/project/android
        mkdir -p build_64
        cd build_64
        chmod +x ../build_64.sh
        ../build_64.sh
      env:
        ANDROID_NDK: /usr/local/lib/android/sdk/ndk/25.2.9519653
        
    - name: Build APK
      run: |
        cd MNN/project/android/demo
        chmod +x gradlew
        
        # 使用预装的 SDK
        echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties
        
        # 不设置 ndk.dir，让 Gradle 自动查找
        ./gradlew assembleDebug
      env:
        ANDROID_HOME: /usr/local/lib/android/sdk
        
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: mnn-apk-3.5.0
        path: MNN/project/android/demo/app/build/outputs/apk/debug/*.apk

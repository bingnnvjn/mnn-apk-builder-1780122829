name: Build MNN APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Clone MNN 3.5.0
      run: git clone --depth 1 --branch 3.5.0 https://github.com/alibaba/MNN.git
      
    - name: Setup Java 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        
    - name: Install Android SDK and NDK
      run: |
        # 安装 Android SDK
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdtools.zip
        sudo mkdir -p /usr/local/lib/android/sdk
        sudo unzip -q cmdtools.zip -d /usr/local/lib/android/sdk
        sudo mv /usr/local/lib/android/sdk/cmdline-tools /usr/local/lib/android/sdk/cmdline-tools/latest
        
        # 设置环境变量
        echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
        echo "/usr/local/lib/android/sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "/usr/local/lib/android/sdk/platform-tools" >> $GITHUB_PATH
        
    - name: Accept SDK Licenses
      run: |
        yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses
        
    - name: Install SDK Components
      run: |
        /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager "build-tools;28.0.3"
        /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-28"
        /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager "ndk;25.2.9519653"
        
    - name: Build MNN Libraries
      run: |
        cd MNN/project/android
        mkdir -p build_64
        cd build_64
        chmod +x ../build_64.sh
        ../build_64.sh
      env:
        ANDROID_NDK: /usr/local/lib/android/sdk/ndk/25.2.9519653
        
    - name: Build APK
      run: |
        cd MNN/project/android/demo
        chmod +x gradlew
        
        # 创建 local.properties
        echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties
        echo "ndk.dir=/usr/local/lib/android/sdk/ndk/25.2.9519653" >> local.properties
        
        ./gradlew assembleDebug
      env:
        ANDROID_NDK: /usr/local/lib/android/sdk/ndk/25.2.9519653
        ANDROID_HOME: /usr/local/lib/android/sdk
        
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: mnn-apk-3.5.0
        path: MNN/project/android/demo/app/build/outputs/apk/debug/*.apk

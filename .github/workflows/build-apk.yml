name: Build MNN APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Clone MNN 3.5.0
      run: git clone --depth 1 --branch 3.5.0 https://github.com/alibaba/MNN.git
      
    - name: Setup Java 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Install NDK
      run: |
        yes | sdkmanager "ndk;25.2.9519653"
        
    - name: Build MNN Libraries
      run: |
        cd MNN/project/android
        mkdir -p build_64
        cd build_64
        chmod +x ../build_64.sh
        ../build_64.sh
      env:
        ANDROID_NDK: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
        
    - name: Build APK
      run: |
        cd MNN/project/android/demo
        chmod +x gradlew
        
        # 创建 local.properties
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        echo "ndk.dir=$ANDROID_HOME/ndk/25.2.9519653" >> local.properties
        
        ./gradlew assembleDebug
      env:
        ANDROID_NDK: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
        
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: mnn-apk-3.5.0
        path: MNN/project/android/demo/app/build/outputs/apk/debug/*.apk

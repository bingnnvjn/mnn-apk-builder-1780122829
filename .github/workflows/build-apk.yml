name: Build MNN APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Clone MNN 3.5.0
      run: git clone --depth 1 --branch 3.5.0 https://github.com/alibaba/MNN.git
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK and NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r25c
        
    - name: Build MNN Libraries
      run: |
        cd MNN/project/android
        mkdir -p build_64
        cd build_64
        chmod +x ../build_64.sh
        ../build_64.sh
      env:
        ANDROID_NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
        
    - name: Build APK
      run: |
        cd MNN/project/android/demo
        chmod +x gradlew
        ./gradlew assembleDebug
      env:
        ANDROID_NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
        ANDROID_HOME: ${{ env.ANDROID_HOME }}
        
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: mnn-apk-3.5.0
        path: MNN/project/android/demo/app/build/outputs/apk/debug/*.apk

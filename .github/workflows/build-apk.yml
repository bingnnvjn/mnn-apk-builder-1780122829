name: Build MNN APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Clone MNN 3.5.0
      run: git clone --depth 1 --branch 3.5.0 https://github.com/alibaba/MNN.git
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android
      uses: android-actions/setup-android@v3
      
    - name: Setup NDK
      run: |
        yes | sdkmanager "ndk;25.2.9519653"
        echo "ANDROID_NDK=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
        
    - name: Build MNN
      run: |
        cd MNN/project/android
        mkdir build && cd build
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI="arm64-v8a" \
          -DANDROID_PLATFORM=android-21 \
          -DMNN_BUILD_FOR_ANDROID_COMMAND=true \
          -DMNN_LOW_MEMORY=true \
          -DMNN_BUILD_LLM=true \
          -DMNN_SUPPORT_TRANSFORMER_FUSE=true \
          -DLLM_SUPPORT_VISION=true \
          -DMNN_BUILD_OPENCV=true
        make -j4
        
    - name: Build APK
      run: |
        cd MNN/project/android/demo
        chmod +x gradlew
        ./gradlew assembleDebug
        
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: mnn-apk-3.5.0
        path: MNN/project/android/demo/app/build/outputs/apk/debug/*.apk
